<!DOCTYPE html>
<html>
<head>
<title>CareerPilot AI</title>
<style>
body{
font-family:Arial;
background:#f4f6f9;
text-align:center;
margin-top:40px;
}

#chatbox{
width:60%;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:70%;
padding:10px;
}

button{
padding:10px 20px;
background:#0070f3;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.message{
margin-top:10px;
text-align:left;
}
</style>
</head>

<body>

<h1>CareerPilot AI</h1>
<p>Resume & Interview Preparation Assistant</p>

<div id="chatbox">

<div id="messages"></div>

<input id="userInput" placeholder="Ask about resume or interview..." />
<button onclick="sendMessage()">Send</button>

</div>

<script>

async function sendMessage(){

const input = document.getElementById("userInput");
const messages = document.getElementById("messages");

const userText = input.value;

messages.innerHTML += "<div class='message'><b>You:</b> "+userText+"</div>";

input.value="";

const response = await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer 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"
},
body:JSON.stringify({
model:"openai/gpt-4o-mini",
messages:[
{
role:"system",
content:"You are a helpful, intelligent, and friendly AI assistant. You can answer any question, help with studies, careers, business, and general knowledge."
},
{
role:"user",
content:userText
}
]
})
});

const data = await response.json();

const aiReply = data.choices[0].message.content;

messages.innerHTML += "<div class='message'><b>AI:</b> "+aiReply+"</div>";

}

</script>

</body>
</html>
