<!DOCTYPE html>
<html>
<head>
<title>Nova AI</title>

<style>
body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
margin-top:40px;
}

#chatbox{
width:60%;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:70%;
padding:10px;
}

button{
padding:10px 20px;
background:#0070f3;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.message{
margin-top:10px;
text-align:left;
}
</style>

</head>

<body>

<h1>Nova AI</h1>
<p>Your Smart AI Assistant</p>

<div id="chatbox">
<div id="messages"></div>

<input id="userInput" placeholder="Ask me anything..." />
<button onclick="sendMessage()">Send</button>
</div>

<script>

function generateReply(input){

input = input.toLowerCase();

// greetings
if(input.includes("hello") || input.includes("hi")){
return "Hello! How can I help you today?";
}

// how are you
if(input.includes("how are you")){
return "I'm doing great! Ready to help you 🚀";
}

// name
if(input.includes("your name")){
return "I am Nova AI, your smart assistant.";
}

// instagram founder
if(input.includes("instagram founder")){
return "Instagram was founded by Kevin Systrom and Mike Krieger.";
}

// war / news
if(input.includes("war") || input.includes("conflict")){
return "Global conflicts depend on geopolitical factors. It's best to check reliable news sources for the latest updates.";
}

// career
if(input.includes("career")){
return "Focus on skills, internships, networking, and continuous learning to build a strong career.";
}

// mba
if(input.includes("mba")){
return "For MBA, prepare for exams like CAT/GRE, build a strong profile, and improve communication skills.";
}

// interview
if(input.includes("interview")){
return "Prepare your introduction, research the company, and practice common questions.";
}

// study
if(input.includes("study")){
return "Make a study plan, stay consistent, and revise regularly.";
}

// fallback (smarter)
return "I'm still learning! Try asking about career, MBA, interviews, or general knowledge 😊";
}

function sendMessage(){

const input = document.getElementById("userInput");
const messages = document.getElementById("messages");

const userText = input.value;

if(userText.trim() === "") return;

messages.innerHTML += "<div class='message'><b>You:</b> " + userText + "</div>";

const reply = generateReply(userText);

messages.innerHTML += "<div class='message'><b>AI:</b> " + reply + "</div>";

input.value = "";

}

</script>

</body>
</html>
