<!DOCTYPE html>
<html>
<head>
<title>CareerPilot AI</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
}

#chatbox{
width:60%;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

#messages{
text-align:left;
margin-bottom:20px;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>CareerPilot AI</h1>
<p>Free AI for Resume Building & Interview Preparation</p>

<div id="chatbox">

<div id="messages"></div>

<input id="userInput" placeholder="Ask your career question here..."/>

<button onclick="sendMessage()">Send</button>

</div>

<script>

async function sendMessage(){

let input=document.getElementById("userInput").value;

document.getElementById("messages").innerHTML +=
"<p><b>You:</b> "+input+"</p>";

const response = await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",

headers:{
"Authorization":"Bearer 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",
"Content-Type":"application/json"
},

body:JSON.stringify({

model:"openai/gpt-4o-mini",

messages:[
{
role:"system",
content:"You are a professional career coach helping users create resumes and prepare for job and MBA interviews."
},
{
role:"user",
content:input
}

]

})

});

const data = await response.json();

let reply = data.choices[0].message.content;

document.getElementById("messages").innerHTML +=
"<p><b>AI:</b> "+reply+"</p>";

}

</script>

</body>
</html>
