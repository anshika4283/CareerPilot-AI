<!DOCTYPE html>
<html>
<head>
<title>Nova AI</title>

<style>
body{
font-family: Arial;
background: #f4f6f9;
text-align: center;
margin-top: 40px;
}

#chatbox{
width: 60%;
margin: auto;
background: white;
padding: 20px;
border-radius: 10px;
box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input{
width: 70%;
padding: 10px;
margin-top: 10px;
}

button{
padding: 10px 20px;
background: #0070f3;
color: white;
border: none;
border-radius: 5px;
cursor: pointer;
}

.message{
margin-top: 10px;
text-align: left;
}
</style>

</head>

<body>

<h1>Nova AI</h1>
<p>Your Smart AI Assistant for Everything</p>

<div id="chatbox">
<div id="messages"></div>

<input id="userInput" placeholder="Ask me anything..." />
<button onclick="sendMessage()">Send</button>
</div>

<script>

async function sendMessage(){

const input = document.getElementById("userInput");
const messages = document.getElementById("messages");

const userText = input.value;

if(userText.trim() === "") return;

messages.innerHTML += "<div class='message'><b>You:</b> " + userText + "</div>";
input.value = "";

messages.innerHTML += "<div class='message'><b>AI:</b> Thinking...</div>";

try {

const response = await fetch("/api/chat", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
message: userText
})
});

const data = await response.json();

messages.innerHTML = messages.innerHTML.replace("Thinking...", data.reply);

} catch (error) {
messages.innerHTML = messages.innerHTML.replace("Thinking...", "Error: " + error.message);
}

}

</script>

</body>
</html>
