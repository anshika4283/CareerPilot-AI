<!DOCTYPE html>
<html>
<head>
<title>Nova AI</title>

<style>
body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
margin-top:40px;
}

#chatbox{
width:60%;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:70%;
padding:10px;
}

button{
padding:10px 20px;
background:#0070f3;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.message{
margin-top:10px;
text-align:left;
}
</style>

</head>

<body>

<h1>Nova AI</h1>
<p>Your Smart AI Assistant</p>

<div id="chatbox">
<div id="messages"></div>

<input id="userInput" placeholder="Ask me anything..." />
<button onclick="sendMessage()">Send</button>
</div>

<script>

function generateReply(input){

input = input.toLowerCase();

if(input.includes("hello") || input.includes("hi")){
return "Hello! How can I help you today?";
}

if(input.includes("name")){
return "I am Nova AI, your assistant.";
}

if(input.includes("career")){
return "For a strong career, focus on skills, networking, and consistent learning.";
}

if(input.includes("mba")){
return "For MBA, focus on CAT/GRE, strong profile, and good communication skills.";
}

if(input.includes("interview")){
return "For interviews, prepare your introduction, practice common questions, and stay confident.";
}

if(input.includes("study")){
return "Create a study schedule, avoid distractions, and revise regularly.";
}

return "That's interesting! Tell me more or ask something specific.";
}

function sendMessage(){

const input = document.getElementById("userInput");
const messages = document.getElementById("messages");

const userText = input.value;

if(userText.trim() === "") return;

messages.innerHTML += "<div class='message'><b>You:</b> " + userText + "</div>";

const reply = generateReply(userText);

messages.innerHTML += "<div class='message'><b>AI:</b> " + reply + "</div>";

input.value = "";

}

</script>

</body>
</html>
