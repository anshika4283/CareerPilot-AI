<!DOCTYPE html>
<html>
<head>
<title>Nova AI</title>

<style>
body{
font-family: Arial;
background: #f4f6f9;
text-align: center;
margin-top: 40px;
}

#chatbox{
width: 60%;
margin: auto;
background: white;
padding: 20px;
border-radius: 10px;
box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input{
width: 70%;
padding: 10px;
margin-top: 10px;
}

button{
padding: 10px 20px;
background: #0070f3;
color: white;
border: none;
border-radius: 5px;
cursor: pointer;
}

.message{
margin-top: 10px;
text-align: left;
}
</style>

</head>

<body>

<h1>Nova AI</h1>
<p>Your Smart AI Assistant for Everything</p>

<div id="chatbox">

<div id="messages"></div>

<input id="userInput" placeholder="Ask me anything..." />
<button onclick="sendMessage()">Send</button>

</div>

<script>

async function sendMessage(){

const input = document.getElementById("userInput");
const messages = document.getElementById("messages");

const userText = input.value;

if(userText.trim() === "") return;

messages.innerHTML += "<div class='message'><b>You:</b> " + userText + "</div>";

input.value = "";

// Loading message
messages.innerHTML += "<div class='message'><b>AI:</b> Thinking...</div>";

try {

const response = await fetch("https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.1", {
method: "POST",
headers: {
"Authorization": "Bearerhf_vKmQzpcCaVKnqHjXbaYXiUDmvIkaKXRNQW",
"Content-Type": "application/json"
},
body: JSON.stringify({
inputs: userText
})
});

const data = await response.json();

let aiReply = "No response";

// Extract reply properly
if(Array.isArray(data) && data[0]?.generated_text){
aiReply = data[0].generated_text;
}else if(data.generated_text){
aiReply = data.generated_text;
}else{
aiReply = JSON.stringify(data);
}

// Remove "Thinking..." and show actual response
messages.innerHTML = messages.innerHTML.replace("Thinking...", aiReply);

} catch (error) {

messages.innerHTML = messages.innerHTML.replace("Thinking...", "Error: " + error.message);

}

}

</script>

</body>
</html>
